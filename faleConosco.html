<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fale conosco</title>
        <link rel="stylesheet" href="layout.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body style="background-color: white !important; background-image: none !important">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <iframe src="header.html" style="width:100%; border:none;height: 10%;"></iframe>
        <main style="padding: 1%;">
            <h3>Fale conosco</h3>
            <form class="col-12 col-sm-12 col-md-4">
                <div class="mb-3">
                    <label for="NameField" class="form-label">Nome:</label>
                    <input type="text" class="form-control" id="NameField" placeholder="Ex: Bruno">
                </div>
                <div class="mb-3">
                    <label for="NameField" class="form-label">Assunto:</label>
                    <select name="" id="SubjectField">
                        <option value="0">Reclamação</option>
                        <option value="1">Elogiar</option>
                        <option value="2" selected>Tirar dúvida</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="EmailField" class="form-label">Endereço de Email:</label>
                    <input type="email" class="form-control" id="EmailField" placeholder="Ex: email@email.com">
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </main>

        <iframe src="footer.html" class="footer-frame"></iframe>
    </body>
</html>
